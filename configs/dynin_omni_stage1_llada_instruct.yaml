wandb:
  entity: null
  resume: "auto"

experiment:
  project: "dynin-omni-training-stage1"
  name: "dynin-omni-training-stage1"
  output_dir: "ckpt/dynin_omni/dynin-omni-training-stage1"
  save_every: 5000
  eval_every: null
  generate_every: null
  log_every: 1
  log_grad_norm_every: 100
  resume_from_checkpoint: "latest"

model:
  vq_model_image:
    type: "magvitv2"
    vq_model_name: "snu-aidas/magvitv2"
  vq_model_audio:
    type: "emova"
    vq_model_name: "snu-aidas/emova_speech_tokenizer_hf"
  dynin_omni:
    tokenizer_path: "GSAI-ML/LLaDA-8B-Instruct"
    pretrained_model_path: "Gen-Verse/MMaDA-8B-MixCoT"
    local_files_only: false
    w_clip_vit: false
    new_vocab_size: 138752
    llm_vocab_size: 126464
    codebook_size: 8192
    num_vq_tokens: 256
    num_new_special_tokens: 5
    tie_word_embeddings: false
  gradient_checkpointing: true

dataset:
  hf:
    cache_dir: "datasets/huggingface"
  gen_type: "pass"
  und_type: "pass"
  combined_loader_mode: "max_size_cycle"
  sources:
    video:
      - id: "webvid10m"
        repo_id: "TempoFunk/webvid-10M"
        path: "datasets/video/webvid-10M"
        split: "train"
    speech:
      - dataset_id: "speechcolab/gigaspeech"
        config: "xl"
        split: "train"
      - dataset_id: "openslr/librispeech_asr"
        config: "clean"
        split: "all"
  params:
    video_caption_dataset:
      dataset_name: "webvid10m"
      webvid10m_path: "datasets/video/webvid-10M"
      sample_method: "uniform_sequential"
      num_frames: 8
      max_video_seconds: 10
    audio_data:
      - dataset_id: "speechcolab/gigaspeech"
        config: "xl"
        split: "train"
      - dataset_id: "openslr/librispeech_asr"
        config: "clean"
        split: "all"
    num_workers: 0
    resolution: 128
    pin_memory: true
    persistent_workers: true
    dataloader_timeout: 0

  preprocessing:
    max_seq_length: 128
    max_aud_length: 256
    resolution: 128
    center_crop: false
    random_flip: false

evaluation:
  s2t_librispeech_root: null
  v2t_video_root: null
  audio_output_dirname: "eval_audio"

optimizer:
  name: adamw
  params:
    learning_rate: 1e-5
    scale_lr: false
    beta1: 0.9
    beta2: 0.999
    weight_decay: 0.1
    epsilon: 1e-8

lr_scheduler:
  scheduler: "cosine"
  params:
    learning_rate: ${optimizer.params.learning_rate}
    warmup_steps: 3000
    min_lr_scale: 0.1

training:
  gradient_accumulation_steps: 1
  noise_type: "mask"
  batch_size_t2i: 0
  batch_size_lm: 0
  batch_size_mmu: 0
  batch_size_v2t: 1
  batch_size_s2t: 1
  batch_size_t2s: 1

  mixed_precision: "bf16"
  enable_tf32: true
  seed: 10086
  max_train_steps: 200000
  max_train_epochs: 1
  overfit_one_batch: false
  cond_dropout_prob: 0.1
  min_masking_rate: 0.0
  label_smoothing: 0.0
  max_grad_norm: 1
  guidance_scale: 1.5
  generation_timesteps: 16

  t2i_coeff: 0.0
  lm_coeff: 0.0
  mmu_coeff: 0.0
  v2t_coeff: 1.0
  t2s_coeff: 1.0
  s2t_coeff: 1.0
